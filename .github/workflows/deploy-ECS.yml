name: CD service-discovery

on:
  push:
    branches:
      - dev
      - staging
      - production
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy service-discovery
    runs-on: ubuntu-latest
    env:
      AWS_ECR_REPOSITORY_NAME: versapath/service-discovery
      AWS_ECS_CLUSTER_NAME: versapath-cluster
      AWS_ECS_SERVICE_NAME: versapath-service-discovery
      AWS_DEFAULT_REGION: eu-west-1
      IMAGE_TAG: ${{ github.sha }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_DEFAULT_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build, tag, and push image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ env.AWS_ECR_REPOSITORY_NAME }}
        IMAGE_TAG: ${{ env.IMAGE_TAG }}
      run: |
        echo "Building Docker image..."
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
        docker tag $REGISTRY/$REPOSITORY:$IMAGE_TAG $REGISTRY/$REPOSITORY:latest
        echo "Pushing to ECR..."
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        docker push $REGISTRY/$REPOSITORY:latest

    - name: Render new ECS task definition
      id: render-task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: .aws/ecs-task-def.json # Path to your ECS task definition JSON file
        container-name: service-discovery # Must match container name in your ECS task definition
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_ECR_REPOSITORY_NAME }}:${{ env.IMAGE_TAG }}

    - name: Deploy new ECS task definition revision
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.render-task-def.outputs.task-definition }}
        service: ${{ env.AWS_ECS_SERVICE_NAME }}
        cluster: ${{ env.AWS_ECS_CLUSTER_NAME }}
        wait-for-service-stability: true
